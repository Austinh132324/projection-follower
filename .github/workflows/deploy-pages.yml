# Manual deploy of the dashboard to GitHub Pages.
#
# This publishes the STATIC, mock-data build of the web app (no backend), so it
# runs anywhere — including a phone browser. Trigger it by hand from the Actions
# tab ("Run workflow"). VITE_USE_MOCK=true bakes in the bundled demo data.
#
# One-time setup: repo Settings → Pages → "Build and deployment" → Source =
# "GitHub Actions".
name: Deploy dashboard to Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Build (static, mock data)
        env:
          VITE_USE_MOCK: 'true'
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
