# Deploys the dashboard to GitHub Pages straight from `main` — build the static
# site and publish it via GitHub's native Pages deployment. No extra branch.
#
# The Pages "deploy" step occasionally returns a transient "Deployment failed,
# try again later"; this workflow retries it up to 3 times so a run self-heals
# instead of failing.
#
# Runs ONLY when you start it by hand: Actions → "Deploy dashboard to Pages" →
# Run workflow. One-time setup: Settings → Pages → Source = "GitHub Actions".
name: Deploy dashboard to Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Build (static, mock data)
        env:
          VITE_USE_MOCK: 'true'
        run: npm run build

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      # Retry the Pages deploy: attempt 1 → 2 → 3, with backoff between tries,
      # to ride out the transient "try again later" error.
      - id: a1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.a1.outcome == 'failure'
        run: sleep 20
      - id: a2
        if: steps.a1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.a1.outcome == 'failure' && steps.a2.outcome == 'failure'
        run: sleep 30
      - id: a3
        if: steps.a1.outcome == 'failure' && steps.a2.outcome == 'failure'
        uses: actions/deploy-pages@v4
