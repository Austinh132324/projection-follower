# Deploys the dashboard to GitHub Pages by publishing the built static site to a
# `gh-pages` branch. This is the classic branch-based method: the deploy step is
# just a git push, which sidesteps the flaky Actions "deploy-pages" API that was
# failing intermittently with "Deployment failed, try again later".
#
# Runs ONLY when you start it by hand from the Actions tab ("Run workflow").
#
# ONE-TIME SETUP (only you can do this, after the first run creates the branch):
#   repo Settings → Pages → "Build and deployment" → Source = "Deploy from a
#   branch" → Branch = "gh-pages" / "(root)" → Save.
name: Deploy dashboard to Pages

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build (static, mock data)
        working-directory: web
        env:
          VITE_USE_MOCK: 'true'
        run: |
          npm ci
          npm run build
          touch dist/.nojekyll

      - name: Publish to gh-pages branch
        run: |
          cd web/dist
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
