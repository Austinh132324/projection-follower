# Deploys the dashboard to GitHub Pages — the static, on-device build (no
# backend), so it runs anywhere including a phone browser. Runs ONLY when you
# start it by hand from the Actions tab ("Run workflow") — never automatically.
# VITE_USE_MOCK=true bakes in the browser-stored data mode.
#
# One-time setup (only you can do this): repo Settings → Pages → "Build and
# deployment" → Source = "GitHub Actions". A workflow_dispatch workflow is only
# runnable once it exists on the default branch (main), so merge this first.
name: Deploy dashboard to Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Build (static, mock data)
        env:
          VITE_USE_MOCK: 'true'
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
